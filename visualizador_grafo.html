<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador - Grafo de Tráfego</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f9; }
    textarea { width: 100%; height: 100px; margin-bottom: 10px; font-family: monospace; }
    button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    #grafo-container { width: 100%; height: 600px; border: 1px solid #ccc; background: white; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Grafo de Tráfego</h2>
<textarea id="json-input" placeholder="Cole aqui o conteúdo do seu arquivo .json..."></textarea>
<button onclick="gerarGrafo()">Gerar Grafo</button>
<div id="grafo-container"></div>

<script>
  // Formata o objeto de sinal em texto legível (ex: 🚦 45v/30r)
  function formatarSinal(cfg, globais) {
    if (!cfg) return "";
    if (cfg.referencia) {
      const g = globais[cfg.referencia];
      if (g) return ` [🚦 ${g.verde_s}v/${g.vermelho_s}r]`;
      return ` [🚦 ${cfg.referencia}]`;
    }
    return ` [🚦 ${cfg.verde_s}v/${cfg.vermelho_s}r]`;
  }

  function gerarGrafo() {
    const textoJson = document.getElementById('json-input').value.trim();
    if (!textoJson) {
      alert("Cole o conteúdo do arquivo .json antes de gerar o grafo.");
      return;
    }

    let data;
    try {
      data = JSON.parse(textoJson);
    } catch (e) {
      alert("JSON inválido: " + e.message);
      return;
    }

    const sinaisGlobais = data.sinais_globais || {};
    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();

    // Mapeia nome da rua → lista de IDs de cruzamentos que a contêm
    const ruasMap = {};
    let contadorNos = 0;

    // 1. Cria os nós (Cruzamentos)
    data.cruzamentos.forEach((cruz) => {
      contadorNos++;
      const cruzId = 'C' + contadorNos;

      let label = cruzId;
      if (cruz.sinal_padrao) {
        label += '\n' + formatarSinal(cruz.sinal_padrao, sinaisGlobais).trim();
      }

      nodes.add({ id: cruzId, label: label, shape: 'circle', color: '#a5d6a7' });

      cruz.entradas.forEach(e => {
        // CORREÇÃO: era "if (ruasMap[e.rua])" — lógica invertida, nunca acumulava
        if (!ruasMap[e.rua]) ruasMap[e.rua] = [];
        ruasMap[e.rua].push(cruzId);
      });
    });

    // 2. Cria as arestas (Ruas)
    data.ruas.forEach(rua => {
      const conexoes = ruasMap[rua.id] || [];

      // Monta label da rua com sinais internos
      let labelRua = rua.id;
      rua.sinais_internos.forEach(sinal => {
        labelRua += '\n' + formatarSinal(sinal.configuracao, sinaisGlobais).trim();
      });

      // CORREÇÃO: era "rua.mao == 'unica'" (invertido) — mão única tem seta só em um sentido
      const ehUnica = rua.mao === 'unica';
      const setas   = ehUnica ? 'to' : 'to, from';

      if (conexoes.length === 2) {
        edges.add({ from: conexoes[0], to: conexoes[1], label: labelRua, arrows: setas });
      } else if (conexoes.length === 1) {
        contadorNos++;
        const stubId = 'S' + contadorNos;
        nodes.add({ id: stubId, label: stubId, shape: 'circle', color: '#a5d6a7' });
        edges.add({ from: conexoes[0], to: stubId, label: labelRua, arrows: setas });
      }
    });

    // 3. Renderiza
    const container = document.getElementById('grafo-container');
    const networkData = { nodes: nodes, edges: edges };
    const options = {
      edges: {
        font: { align: 'horizontal', background: '#ffffff', strokeWidth: 0 },
        smooth: { type: 'dynamic' }
      },
      physics: {
        barnesHut: { gravitationalConstant: -8000, springLength: 250 }
      }
    };

    new vis.Network(container, networkData, options);
  }
</script>

</body>
</html>
